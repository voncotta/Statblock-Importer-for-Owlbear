<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GM Stat Blocks</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --ui-bg:#2a1f0e;--ui-surface:#3d2e14;--ui-border:#6b5030;
      --ui-text:#e8dfc8;--ui-muted:#8b7355;--gold:#c4a055;--red:#6b2020;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--ui-bg);color:var(--ui-text);font-family:'Crimson Text',Georgia,serif;font-size:14px;min-height:100vh;}
    .header{background:var(--ui-surface);border-bottom:2px solid var(--gold);padding:10px 14px;}
    .header h1{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);}
    .header p{font-size:11px;color:var(--ui-muted);font-style:italic;margin-top:2px;}
    .token-list{padding:8px 0;}
    .token-entry{padding:8px 14px;border-bottom:1px solid var(--ui-border);cursor:pointer;transition:background 0.12s;display:flex;align-items:center;gap:10px;}
    .token-entry:hover{background:#4a3820;}
    .token-icon{width:32px;height:32px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#f5e6c8;font-family:'Cinzel',serif;font-size:13px;font-weight:700;border:2px solid var(--gold);flex-shrink:0;}
    .token-info{flex:1;min-width:0;}
    .token-name{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .token-meta{font-size:11px;color:var(--ui-muted);font-style:italic;margin-top:1px;}
    .empty{padding:36px 18px;text-align:center;color:var(--ui-muted);font-style:italic;}
    .empty .icon{font-size:34px;display:block;margin-bottom:8px;opacity:0.35;}
    .footer-hint{padding:10px 14px;border-top:1px solid var(--ui-border);font-size:11px;color:#5b4a30;line-height:1.6;}
    .footer-hint strong{color:var(--ui-muted);}
  </style>
</head>
<body>
<div class="header">
  <h1>📜 GM Stat Blocks</h1>
  <p>Symbaroum · Privat GM visning</p>
</div>
<div id="token-list" class="token-list">
  <div class="empty"><span class="icon">⚔️</span>Indlæser…</div>
</div>
<div class="footer-hint">
  <strong>Højreklik på en token</strong> for at importere eller se dens stat block.
</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2.3.0/+esm";
const EXT_ID = "com.symbaroum.statblocks";
const BASE = "https://voncotta.github.io/Statblock-Importer-for-Owlbear";

OBR.onReady(async () => {

  // Sæt context menu op
  OBR.contextMenu.create({
    id: `${EXT_ID}/view`,
    icons: [{ icon: `${BASE}/eye.svg`, label: "View Stat Block", filter: { every: [{ key: "layer", value: "CHARACTER" }] }}],
    onClick() { OBR.popover.open({ id: `${EXT_ID}/view-popover`, url: `${BASE}/statblock-popover.html`, height: 620, width: 440 }); }
  });

  OBR.contextMenu.create({
    id: `${EXT_ID}/edit`,
    icons: [{ icon: `${BASE}/edit.svg`, label: "Edit Stat Block", filter: { every: [{ key: "layer", value: "CHARACTER" }] }}],
    onClick() { OBR.popover.open({ id: `${EXT_ID}/edit-popover`, url: `${BASE}/edit-statblock.html`, height: 560, width: 380 }); }
  });

  // Vis tokens med stat blocks
  const items = await OBR.scene.items.getItems();
  renderList(items);
  OBR.scene.items.onChange(updated => renderList(updated));
});

function renderList(items) {
  const listEl = document.getElementById("token-list");
  const withSB = items.filter(i => i.layer === "CHARACTER" && i.metadata?.[`${EXT_ID}/statblock`]);
  if (!withSB.length) {
    listEl.innerHTML = `<div class="empty"><span class="icon">📜</span>Ingen stat blocks tilknyttet endnu.<br/><span style="font-size:12px">Højreklik på en token → <em>Edit Stat Block</em></span></div>`;
    return;
  }
  listEl.innerHTML = "";
  withSB.forEach(item => {
    const sb = item.metadata[`${EXT_ID}/statblock`];
    const name = sb.fields?.name || item.name || "Ukendt";
    const race = sb.raceCustom || sb.fields?.race || '';
    const div = document.createElement("div");
    div.className = "token-entry";
    div.innerHTML = `
      <div class="token-icon">${name[0]?.toUpperCase() || '?'}</div>
      <div class="token-info">
        <div class="token-name">${name}</div>
        <div class="token-meta">${race || 'Karakter'}</div>
      </div>`;
    div.addEventListener("click", async () => await OBR.player.select([item.id]));
    listEl.appendChild(div);
  });
}
</script>
</body>
</html>
