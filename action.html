<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GM Stat Blocks</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#2a1f0e;--surface:#3d2e14;--border:#6b5030;
      --text:#e8dfc8;--muted:#8b7355;--gold:#c4a055;--red:#6b2020;
      --parchment:#e8dfc8;--ink:#1a1208;--brown:#8b7355;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:14px;}

    /* Header */
    .header{background:var(--surface);border-bottom:2px solid var(--gold);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
    .header h1{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);}
    .header-hint{font-size:10px;color:var(--muted);font-style:italic;}

    /* Token cards */
    .card{border-bottom:1px solid var(--border);overflow:hidden;}
    .card-header{
      display:flex;align-items:center;gap:8px;
      padding:8px 12px;cursor:pointer;
      transition:background 0.12s;user-select:none;
    }
    .card-header:hover{background:#4a3820;}
    .card-header.open{background:#3d2e14;border-bottom:1px solid var(--border);}
    .card-icon{
      width:28px;height:28px;border-radius:50%;
      background:var(--red);border:2px solid var(--gold);
      display:flex;align-items:center;justify-content:center;
      font-family:'Cinzel',serif;font-size:12px;font-weight:700;
      color:#f5e6c8;flex-shrink:0;
    }
    .card-title{flex:1;min-width:0;}
    .card-name{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-meta{font-size:10px;color:var(--muted);font-style:italic;}
    .card-toggle{color:var(--muted);font-size:12px;transition:transform 0.2s;flex-shrink:0;}
    .card-toggle.open{transform:rotate(180deg);}

    /* Stat block inside card */
    .card-body{display:none;background:var(--parchment);color:var(--ink);font-family:'Crimson Text',Georgia,serif;}
    .card-body.open{display:block;}

    /* Stat block styles */
    .sb{padding:12px 14px 10px;}
    .sb-name{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;margin-bottom:2px;}
    .sb-sub{font-style:italic;font-size:0.82rem;color:#5c3d1e;margin-bottom:5px;}
    hr.thick{border:none;border-top:2px solid var(--brown);margin:5px 0;}
    hr.thin{border:none;border-top:1px solid var(--brown);margin:4px 0;}
    .attr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:5px 0;}
    .attr-cell{background:rgba(196,180,138,0.3);border:1px solid var(--brown);border-radius:2px;padding:3px 2px;text-align:center;}
    .attr-label{font-size:7.5px;text-transform:uppercase;letter-spacing:0.06em;color:#5c3d1e;font-weight:700;}
    .attr-value{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;}
    .attr-low{color:#2a6e1a;}.attr-mid{color:#1a1208;}.attr-high{color:#6b2020;}
    .sb-table{width:100%;border-collapse:collapse;font-size:0.82rem;margin:3px 0;}
    .sb-table tr:nth-child(odd) td{background:rgba(196,180,138,0.28);}
    .sb-table td{padding:2px 5px;vertical-align:top;line-height:1.35;}
    .sb-table td:first-child{font-weight:600;white-space:nowrap;width:36%;color:#5c3d1e;}
    .section-head{font-family:'Cinzel',serif;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#6b2020;border-bottom:1px solid var(--brown);padding-bottom:1px;margin:6px 0 4px;}
    .ab-block{margin-bottom:3px;font-size:0.82rem;line-height:1.4;}
    .ab-name{font-weight:600;font-style:italic;}
    .ab-level{display:inline-block;background:#6b2020;color:#f5e6c8;border-radius:2px;padding:0px 4px;margin-left:3px;font-size:0.68rem;font-family:'Cinzel',serif;font-weight:600;font-style:normal;vertical-align:middle;}
    .wp-block{margin-bottom:4px;font-size:0.82rem;line-height:1.4;}
    .wp-name{font-weight:600;}
    .wp-badge{display:inline-block;background:rgba(196,180,138,0.4);border:1px solid var(--brown);border-radius:2px;padding:0px 4px;font-size:0.75rem;margin-left:2px;}
    .wp-fx{font-style:italic;color:#5c3d1e;font-size:0.78rem;}
    .tactics{font-size:0.82rem;line-height:1.5;font-style:italic;background:rgba(196,180,138,0.2);border-left:3px solid var(--brown);padding:4px 7px;margin-top:3px;}
    .gm-notes{font-size:0.8rem;line-height:1.4;background:rgba(107,32,32,0.07);border-left:3px solid #6b2020;padding:4px 7px;white-space:pre-wrap;}
    .boon-line{font-size:0.82rem;line-height:1.4;margin-bottom:1px;}
    .burden-line{color:#8b1a1a;}

    /* Empty state */
    .empty{padding:30px 16px;text-align:center;color:var(--muted);font-style:italic;}
    .empty .icon{font-size:28px;display:block;margin-bottom:6px;opacity:0.35;}

    /* Footer */
    .footer{padding:8px 12px;border-top:1px solid var(--border);font-size:10px;color:#5b4a30;line-height:1.5;}
  </style>
</head>
<body>
<div class="header">
  <h1>📜 GM Stat Blocks</h1>
  <span class="header-hint">Klik for at folde ud</span>
</div>

<div id="card-list"></div>

<div class="footer">
  Højreklik på en token → <em>Edit Stat Block</em> for at tilføje.<br/>
  Højreklik → <em>View Stat Block</em> for fuld visning.
</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2.3.0/+esm";
const EXT_ID = "com.symbaroum.statblocks";
const BASE = "https://voncotta.github.io/Statblock-Importer-for-Owlbear";

const ATTRS = [
  {id:'acc',label:'Accurate'},{id:'cun',label:'Cunning'},{id:'dis',label:'Discreet'},
  {id:'per',label:'Persuasive'},{id:'qui',label:'Quick'},{id:'res',label:'Resolute'},
  {id:'str',label:'Strong'},{id:'vig',label:'Vigilant'},
];
const DV = {'1D4':2,'1D4+1':3,'1D6':3,'1D6+1':4,'1D8':4,'1D8+1':5,'1D10':5,'1D10+1':6,'1D12':6,'1D12+1':7};

function attrClass(v){const n=parseInt(v);if(isNaN(n))return 'attr-mid';return n<=7?'attr-low':n>=14?'attr-high':'attr-mid';}
function romanLevel(lv){const m={i:'I',ii:'II',iii:'III',I:'I',II:'II',III:'III',Novice:'Novice',Adept:'Adept',Master:'Master',novice:'Novice',adept:'Adept',master:'Master'};return m[lv]||lv;}

function getDerived(state){
  const a=state.attrs||{},f=state.fields||{};
  const str=parseInt(a.str)||10,qui=parseInt(a.qui)||10;
  let tough=Math.max(10,str);if(f['d-tough-ov'])tough=parseInt(f['d-tough-ov'])||tough;
  let pain=Math.ceil(str/2);if(f['d-pain-ov'])pain=parseInt(f['d-pain-ov'])||pain;
  return{tough,pain,def:qui,init:qui};
}

function getArmorStr(state){
  const f=state.fields||{};
  if(f['armor-custom-val'])return f['armor-custom-val'];
  const m={'Light Armor':4,'Medium Armor':6,'Heavy Armor':8};
  const av=state.armorVal||'';
  return m[av]!==undefined?String(m[av]):av||'—';
}

function renderWeapon(wRow){
  const w=wRow.weapon;
  let name,attr,dmg,fx;
  if(!w||w==='custom'){
    name=wRow.customName||'Custom';attr=wRow.attrUsed||'Accurate';
    dmg=wRow.customDmg||'—';fx=wRow.effects||[];
  } else {
    name=w.n;attr=wRow.attrUsed||'Accurate';dmg=String(DV[w.d]||w.d);
    const quals=w.q?w.q.split(',').map(s=>s.trim()).filter(Boolean):[];
    fx=[...quals,...(wRow.effects||[])];
  }
  let h=`<div class="wp-block"><span class="wp-name">${name}</span>`;
  h+=`<span class="wp-badge">${attr}</span><span class="wp-badge">Dmg ${dmg}</span>`;
  if(fx.length)h+=`<div class="wp-fx">✦ ${fx.join(' · ')}</div>`;
  h+=`</div>`;return h;
}

function renderStatblock(state, tokenName){
  if(!state)return `<div style="padding:10px;font-style:italic;color:#5c3d1e;font-size:0.85rem;">Ingen stat block tilknyttet.</div>`;
  const f=state.fields||{};
  const derived=getDerived(state);
  const name=f.name||tokenName;
  const race=state.raceCustom||f.race||'';
  const shadow=f.shadow||'';

  let h=`<div class="sb">`;
  h+=`<div class="sb-name">${name}</div>`;
  if(race||shadow)h+=`<div class="sb-sub">${race}${shadow?' · Shadow: '+shadow:''}</div>`;
  if(f.description)h+=`<div style="font-size:0.8rem;font-style:italic;color:#5c3d1e;margin-bottom:4px">${f.description}</div>`;
  h+=`<hr class="thick"/>`;

  // Derived
  const av=state.armorVal||'';
  const shieldB={'Shield':2,'Blessed Shield':4}[av]||0;
  const defStr=shieldB?`${derived.def} (+${shieldB} shield)`:String(derived.def);
  h+=`<table class="sb-table">`;
  h+=`<tr><td>Toughness</td><td>${derived.tough}</td><td>Pain Threshold</td><td>${derived.pain}</td></tr>`;
  h+=`<tr><td>Defense</td><td>${defStr}</td><td>Initiative</td><td>${derived.init}</td></tr>`;
  h+=`<tr><td>Armor</td><td colspan="3">${getArmorStr(state)}</td></tr>`;
  h+=`</table><hr class="thick"/>`;

  // Attributes
  h+=`<div class="attr-grid">`;
  ATTRS.forEach(a=>{
    const v=state.attrs?.[a.id]||'—';
    h+=`<div class="attr-cell"><div class="attr-label">${a.label}</div><div class="attr-value ${attrClass(v)}">${v}</div></div>`;
  });
  h+=`</div>`;

  // Weapons
  const weapons=(state.weapons||[]).filter(w=>w.weapon||w.customName);
  if(weapons.length){h+=`<hr class="thin"/><div class="section-head">Weapons</div>`;weapons.forEach(w=>h+=renderWeapon(w));}

  // Abilities
  if(state.abilities?.length){
    h+=`<hr class="thin"/><div class="section-head">Abilities</div>`;
    state.abilities.forEach(a=>{h+=`<div class="ab-block"><span class="ab-name">${a.name}</span><span class="ab-level">${a.level||'Novice'}</span></div>`;});
  }

  // Traits
  if(state.traits?.length){
    h+=`<hr class="thin"/><div class="section-head">Traits</div>`;
    state.traits.forEach(t=>{h+=`<div class="ab-block"><span class="ab-name">${t.name}</span>${t.level?`<span class="ab-level">${romanLevel(t.level)}</span>`:''}</div>`;});
  }

  // Boons
  if(state.boons?.length){
    h+=`<hr class="thin"/><div class="section-head">Boons &amp; Burdens</div>`;
    state.boons.forEach(b=>{h+=`<div class="boon-line ${b.burden?'burden-line':''}>${b.burden?'⚠ ':'✦ '}<strong>${b.name}</strong>${b.qty>1?' ×'+b.qty:''}</div>`;});
  }

  // Tactics
  if(f.tactics)h+=`<hr class="thin"/><div class="section-head">Tactics</div><div class="tactics">${f.tactics}</div>`;

  // GM Notes
  if(state._gmNotes)h+=`<hr class="thin"/><div class="section-head" style="color:#6b2020">GM Notes</div><div class="gm-notes">${state._gmNotes}</div>`;

  h+=`</div>`;return h;
}

// Track which cards are open
const openCards = new Set();

function renderList(items){
  const listEl=document.getElementById("card-list");
  const withSB=items.filter(i=>i.layer==="CHARACTER"&&i.metadata?.[`${EXT_ID}/statblock`]);

  if(!withSB.length){
    listEl.innerHTML=`<div class="empty"><span class="icon">📜</span>Ingen stat blocks endnu.<br/><span style="font-size:11px">Højreklik på en token → <em>Edit Stat Block</em></span></div>`;
    return;
  }

  listEl.innerHTML="";
  withSB.forEach(item=>{
    const sb=item.metadata[`${EXT_ID}/statblock`];
    const f=sb.fields||{};
    const name=f.name||item.name||"Ukendt";
    const race=sb.raceCustom||f.race||'';
    const isOpen=openCards.has(item.id);

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-header ${isOpen?'open':''}" data-id="${item.id}">
        <div class="card-icon">${name[0]?.toUpperCase()||'?'}</div>
        <div class="card-title">
          <div class="card-name">${name}</div>
          <div class="card-meta">${race||'Karakter'}</div>
        </div>
        <div class="card-toggle ${isOpen?'open':''}">▼</div>
      </div>
      <div class="card-body ${isOpen?'open':''}">
        ${renderStatblock(sb, name)}
      </div>`;

    card.querySelector(".card-header").addEventListener("click", ()=>{
      if(openCards.has(item.id)){openCards.delete(item.id);}
      else{openCards.add(item.id);}
      renderList(items);
    });

    listEl.appendChild(card);
  });
}

OBR.onReady(async ()=>{
  // Context menu
  OBR.contextMenu.create({
    id:`${EXT_ID}/view`,
    icons:[{icon:`${BASE}/eye.svg`,label:"View Stat Block",filter:{every:[{key:"layer",value:"CHARACTER"}]}}],
    onClick(){OBR.popover.open({id:`${EXT_ID}/view-popover`,url:`${BASE}/statblock-popover.html`,height:620,width:440});}
  });
  OBR.contextMenu.create({
    id:`${EXT_ID}/edit`,
    icons:[{icon:`${BASE}/edit.svg`,label:"Edit Stat Block",filter:{every:[{key:"layer",value:"CHARACTER"}]}}],
    onClick(){OBR.popover.open({id:`${EXT_ID}/edit-popover`,url:`${BASE}/edit-statblock.html`,height:560,width:380});}
  });

  // Token liste
  const items=await OBR.scene.items.getItems();
  renderList(items);
  OBR.scene.items.onChange(updated=>renderList(updated));
});
</script>
</body>
</html>
